<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <!-- dashed grid -->
    <line x1="32" y1="24" x2="32" y2="128"
          stroke="#94A3B8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-dasharray="18 8 4 8"/>

    <line x1="0" y1="96" x2="96" y2="96"
          stroke="#94A3B8"
          stroke-width="2"
          stroke-linecap="round"
          stroke-dasharray="18 8 4 8"/>

    <!-- main star (fill + outline) -->
    <g transform="translate(60, 72)">
        <path d="
      M0 -26
      C3 -8 9 -3 26 0
      C9 3 3 8 0 26
      C-3 8 -9 3 -26 0
      C-9 -3 -3 -8 0 -26 Z"
              fill="#F6E27A"
              stroke="#D4B84F"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"/>
    </g>

    <!-- small sparkle -->
    <g transform="translate(82, 58)">
        <path d="
      M0 -6 C1 -2 2 -1 6 0
      C2 1 1 2 0 6
      C-1 2 -2 1 -6 0
      C-2 -1 -1 -2 0 -6 Z"
              fill="#94A3B8"/>
    </g>
</svg>
