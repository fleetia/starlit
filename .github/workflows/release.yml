name: Release extension

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release assets
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      archive_name: ${{ steps.release.outputs.archive_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          cache: pnpm
          node-version-file: .node-version
          registry-url: https://npm.pkg.github.com

      - name: Validate release version
        id: release
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          EXPECTED_TAG="v${VERSION}"

          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use the vX.Y.Z format"
            exit 1
          fi

          if [[ "$MANIFEST_VERSION" != "$VERSION" ]]; then
            echo "::error::manifest.json and package.json versions must match"
            exit 1
          fi

          if [[ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]]; then
            echo "::error::Release tag must be ${EXPECTED_TAG}, received ${GITHUB_REF_NAME}"
            exit 1
          fi

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tag must point to a commit on main"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive_name=starlit-${EXPECTED_TAG}.zip" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install chromium

      - name: Verify release build
        run: pnpm check

      - name: Package extension
        env:
          ARCHIVE_NAME: ${{ steps.release.outputs.archive_name }}
          RELEASE_DIR: ${{ runner.temp }}/starlit-release
        shell: bash
        run: |
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          find dist -type d -exec chmod 755 {} +
          find dist -type f -exec chmod 644 {} +
          find dist -exec touch -t 198001010000 {} +

          (
            cd dist
            find . -type f -print \
              | sed 's#^\./##' \
              | LC_ALL=C sort \
              | zip -q -X "$RELEASE_DIR/$ARCHIVE_NAME" -@
          )

          (
            cd "$RELEASE_DIR"
            shasum -a 256 "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          )

          unzip -Z1 "$RELEASE_DIR/$ARCHIVE_NAME" | grep -Fxq 'manifest.json'

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: release-assets-${{ github.ref_name }}
          path: |
            ${{ runner.temp }}/starlit-release/${{ steps.release.outputs.archive_name }}
            ${{ runner.temp }}/starlit-release/${{ steps.release.outputs.archive_name }}.sha256
          retention-days: 1

  release:
    name: Publish GitHub release
    needs: build
    runs-on: macos-26
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets-${{ github.ref_name }}
          path: ${{ runner.temp }}/starlit-release

      - name: Verify release assets
        env:
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          RELEASE_DIR: ${{ runner.temp }}/starlit-release
        shell: bash
        run: |
          cd "$RELEASE_DIR"
          shasum -a 256 -c "${ARCHIVE_NAME}.sha256"

      - name: Publish GitHub release
        env:
          ARCHIVE_NAME: ${{ needs.build.outputs.archive_name }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_DIR: ${{ runner.temp }}/starlit-release
          VERSION: ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          DOWNLOAD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ARCHIVE_NAME}"
          CHECKSUM_URL="${DOWNLOAD_URL}.sha256"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          NOTES_FILE="$RELEASE_DIR/release-notes.md"

          printf '## 다운로드\n\n- [Starlit Chrome extension (%s)](%s)\n- [SHA-256 checksum](%s)\n\n압축을 해제한 뒤 `chrome://extensions`에서 **개발자 모드 → 압축해제된 확장 프로그램을 로드**를 선택하세요.\n' \
            "$ARCHIVE_NAME" "$DOWNLOAD_URL" "$CHECKSUM_URL" > "$NOTES_FILE"

          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "$RELEASE_DIR/$ARCHIVE_NAME#Starlit Chrome extension" \
              "$RELEASE_DIR/${ARCHIVE_NAME}.sha256#SHA-256 checksum" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "$RELEASE_DIR/$ARCHIVE_NAME#Starlit Chrome extension" \
              "$RELEASE_DIR/${ARCHIVE_NAME}.sha256#SHA-256 checksum" \
              --generate-notes \
              --notes-file "$NOTES_FILE" \
              --title "Starlit ${VERSION}" \
              --verify-tag
          fi

          printf '## Starlit %s\n\n- [GitHub Release](%s)\n- [Download %s](%s)\n- [SHA-256 checksum](%s)\n' \
            "$VERSION" "$RELEASE_URL" "$ARCHIVE_NAME" "$DOWNLOAD_URL" "$CHECKSUM_URL" >> "$GITHUB_STEP_SUMMARY"
